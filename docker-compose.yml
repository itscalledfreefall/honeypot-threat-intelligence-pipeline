services:
  # ── Cowrie SSH/Telnet Honeypot ─────────────────────────────────
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeypot-cowrie
    restart: unless-stopped
    # Host networking so Cowrie sees the real attacker source IP. Behind
    # Docker's default bridge/NAT every connection arrives as the gateway
    # address (172.x.0.1), which destroys the attacker-IP threat intel.
    # Cowrie binds 2222 directly on the host; no port mapping needed.
    network_mode: "host"
    environment:
      COWRIE_TELNET_ENABLED: "no"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
      - cowrie-lib:/cowrie/cowrie-git/var/lib/cowrie
      - ./docker/cowrie/etc/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro

  # ── Backend: Flask API + Pipeline CLI ──────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: honeypot-backend
    restart: unless-stopped
    pid: "host"
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=/data/honeypot.db
      - COWRIE_LOG=/logs/cowrie.json
      - DB_PATH=/data/honeypot.db
    volumes:
      - cowrie-logs:/logs:ro        # read Cowrie logs
      - pipeline-data:/data          # SQLite DB
      - pipeline-exports:/exports    # JSONL output
      - pipeline-reports:/reports    # summaries
    depends_on:
      cowrie:
        condition: service_started

  # ── Frontend: nginx + React ────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: honeypot-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: honeypot-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: honeypot-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ALLOW_EMBEDDING: ${GRAFANA_ALLOW_EMBEDDING:-true}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started

volumes:
  cowrie-logs:
  cowrie-lib:
  pipeline-data:
  pipeline-exports:
  pipeline-reports:
  prometheus-data:
  grafana-data:
