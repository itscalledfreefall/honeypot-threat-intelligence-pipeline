name: Deploy VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DEPLOY_ENVIRONMENT: production-vm

jobs:
  build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      image-prefix: ${{ steps.images.outputs.image_prefix }}
      image-tag: ${{ steps.images.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image names
        id: images
        shell: bash
        run: |
          repository_lc="${GITHUB_REPOSITORY,,}"
          echo "image_prefix=${REGISTRY}/${repository_lc}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.image_prefix }}/backend:${{ steps.images.outputs.image_tag }}
            ${{ steps.images.outputs.image_prefix }}/backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.image_prefix }}/frontend:${{ steps.images.outputs.image_tag }}
            ${{ steps.images.outputs.image_prefix }}/frontend:latest

  deploy:
    name: Deploy on Self-Hosted VM
    runs-on:
      - self-hosted
      - linux
      - honeypot-vm
    needs: build
    environment: production-vm
    concurrency:
      group: production-vm
      cancel-in-progress: false
    steps:
      - name: Deploy locally
        shell: bash
        env:
          DEPLOY_PATH: ${{ vars.VM_DEPLOY_PATH || secrets.VM_DEPLOY_PATH }}
          GHCR_IMAGE_PREFIX: ${{ needs.build.outputs.image-prefix }}
          IMAGE_TAG: ${{ needs.build.outputs.image-tag }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          cd "$DEPLOY_PATH"
          git fetch --prune origin main
          git reset --hard origin/main

          printf '%s\n' \
            "GHCR_IMAGE_PREFIX=$GHCR_IMAGE_PREFIX" \
            "IMAGE_TAG=$IMAGE_TAG" \
            > .env.deploy

          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          docker compose --env-file .env.deploy -f docker-compose.yml -f docker-compose.vm.yml pull backend frontend
          docker compose --env-file .env.deploy -f docker-compose.yml -f docker-compose.vm.yml up -d --no-build
          docker image prune -f
